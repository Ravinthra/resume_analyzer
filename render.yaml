# =============================================================
# Render Blueprint — AI Resume Analyzer
# =============================================================
# Deploy: Connect GitHub repo → Render auto-detects this file
# =============================================================

services:
  - type: web
    name: ai-resume-analyzer
    runtime: python
    region: oregon
    plan: free

    # Build
    buildCommand: "chmod +x build.sh && ./build.sh"

    # Start (gunicorn from django_app directory)
    startCommand: "cd app/django_app && gunicorn resume_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"

    # Environment variables
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"
